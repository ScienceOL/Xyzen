services:
  service:
    pull_policy: never
    build:
      context: ../service
      target: dev
    env_file:
      - .env.dev
    volumes:
      - ../service:/app
      - /app/.venv
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh -c "uv sync && uv run python -m app.main"
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:48196/xyzen/api/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5m
    deploy:
      replicas: ${SERVICE_REPLICAS:-3}
      resources: {}

  celery:
    pull_policy: never
    build:
      context: ../service
      target: dev
    env_file:
      - .env.dev
    volumes:
      - ../service:/app
      - /app/.venv
    command: sh -c "uv sync && uv run celery -A app.worker worker --loglevel=info"
    deploy:
      replicas: ${CELERY_REPLICAS:-2}
      resources: {}

  web:
    pull_policy: never
    build:
      context: ../web
      target: dev
    env_file:
      - .env.dev
    volumes:
      - ../web:/app
      - /app/node_modules
      - /app/.yarn
    command: sh -c "corepack enable && yarn install && yarn dev"
    deploy:
      resources: {}

  docs:
    pull_policy: never
    build:
      context: ../docs
      target: dev
    environment:
      - NODE_ENV=development
    volumes:
      - ../docs:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "yarn install && yarn dev"
    deploy:
      resources: {}

  # Dev overrides: remove resource limits for infra services
  nginx:
    deploy:
      resources: {}
  postgresql:
    deploy:
      resources: {}
  redis:
    deploy:
      resources: {}
