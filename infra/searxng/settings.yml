use_default_settings: true

redis:
  url: redis://localhost:6379/0

general:
  instance_name: "Xyzen Search"
  privacypolicy_url: false
  donation_url: false

server:
  secret_key: "754b4bf6bfd589a450139b40c2420d41c0e92760d0594dbcbc5d90e8a3c5aa24"
  limiter: false
  public_instance: false

# Network reliability: increase timeouts and add retries to reduce
# transient failures that cascade into engine suspensions.
outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  retries: 2
  pool_maxsize: 30
  keepalive_expiry: 10.0
  enable_http2: true

search:
  safe_search: 0
  autocomplete: "wikipedia"
  formats:
    - html
    - json
  # Reduce suspension aggression so engines recover faster after transient errors.
  ban_time_on_fail: 10
  max_ban_time_on_fail: 60
  suspended_times:
    SearxEngineAccessDenied: 60
    SearxEngineCaptcha: 300
    SearxEngineTooManyRequests: 60
    cf_SearxEngineCaptcha: 3600
    cf_SearxEngineAccessDenied: 3600

ui:
  default_locale: "en"
  query_in_title: true
  infinite_scroll: false
  default_theme: simple

# Engine configuration
# DuckDuckGo often triggers CAPTCHA for automated requests, so disabled
# Focus on engines less likely to block automated queries
engines:
  # Disabled - prone to CAPTCHA issues
  - name: duckduckgo
    disabled: true

  - name: duckduckgo news
    disabled: true

  # General search engines (with increased timeouts)
  - name: google
    timeout: 6.0
    use_mobile_ui: false

  - name: bing
    timeout: 5.0

  - name: brave
    timeout: 6.0

  - name: qwant
    timeout: 5.0

  # News engines - explicitly enabled with higher timeouts
  - name: google news
    timeout: 6.0

  - name: bing news
    timeout: 6.0

  - name: brave.news
    timeout: 6.0

  - name: qwant news
    timeout: 6.0

  - name: yahoo news
    timeout: 6.0

  - name: wikinews
    timeout: 6.0

  # Knowledge sources (stable, rarely rate-limit)
  - name: wikipedia
    shortcut: wp

  - name: wikidata
    shortcut: wd

  - name: arxiv
    shortcut: ar

  # Code search
  - name: github
    shortcut: gh

  # Academic
  - name: google scholar
    shortcut: gs

  - name: semantic scholar
    shortcut: ss
